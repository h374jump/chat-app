<!DOCTYPE html>
<html>
<head>
<title>Chat App</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  display: flex;
  height: 100vh;
  background: #2c2f33;
  color: white;
}

/* Sidebar */
#sidebar {
  width: 220px;
  background: #202225;
  padding: 10px;
  display: flex;
  flex-direction: column;
}

#roomName {
  font-weight: bold;
  margin-bottom: 20px;
}

button {
  cursor: pointer;
}

/* Main chat */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

#messages {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
}

.message {
  background: #40444b;
  margin: 5px 0;
  padding: 8px;
  border-radius: 6px;
}

.you {
  background: #5865f2;
}

.time {
  font-size: 10px;
  margin-left: 10px;
  opacity: 0.6;
}

/* Input */
#inputArea {
  display: flex;
  padding: 10px;
  background: #23272a;
}

input {
  flex: 1;
  padding: 10px;
  border: none;
  outline: none;
}

#sendBtn {
  padding: 10px;
  background: #5865f2;
  color: white;
  border: none;
}

/* Settings panel */
#settings {
  position: fixed;
  right: -300px;
  top: 0;
  width: 300px;
  height: 100%;
  background: #2c2f33;
  padding: 20px;
  transition: 0.3s;
}

#settings.open {
  right: 0;
}

.setting {
  margin-bottom: 15px;
}

.light-mode {
  background: #f0f0f0;
  color: black;
}
</style>

</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
  <div id="roomName"></div>

  <button onclick="toggleSettings()">⚙️ Settings</button>
</div>

<!-- Main -->
<div id="main">
  <div id="messages"></div>

  <div id="inputArea">
    <input id="messageInput" placeholder="Type message..." />
    <button id="sendBtn">Send</button>
  </div>
</div>

<!-- Settings Panel -->
<div id="settings">
  <h3>Settings</h3>

  <div class="setting">
    <label>Username:</label><br>
    <input id="usernameInput" />
    <button onclick="saveUsername()">Save</button>
  </div>

  <div class="setting">
    <button onclick="toggleTheme()">Toggle Dark/Light</button>
  </div>

  <div class="setting">
    <button onclick="clearChat()">Clear Chat (local)</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

const messagesDiv = document.getElementById("messages");
const input = document.getElementById("messageInput");
const sendBtn = document.getElementById("sendBtn");

let room = prompt("Enter room:");
if (!room) room = "general";

document.getElementById("roomName").innerText = "#" + room;

// username
let username = localStorage.getItem("username");

if (!username) {
  username = prompt("Enter your name:");
  if (!username) username = "User";
  localStorage.setItem("username", username);
}

// join room
socket.emit("joinRoom", room);

// load messages
socket.on("loadMessages", (msgs) => {
  messagesDiv.innerHTML = "";
  msgs.forEach(displayMessage);
});

// send message
sendBtn.onclick = sendMessage;

input.addEventListener("keypress", (e) => {
  if (e.key === "Enter") sendMessage();
});

function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  const msg = {
    name: username,
    text,
    time: new Date().toLocaleTimeString(),
    room
  };

  socket.emit("sendMessage", { room, msg });
  input.value = "";
}

// receive
socket.on("newMessage", displayMessage);

function displayMessage(msg) {
  const div = document.createElement("div");
  div.classList.add("message");

  if (msg.name === username) {
    div.classList.add("you");
  }

  div.innerHTML = `
    <strong>${msg.name}</strong>: ${msg.text}
    <span class="time">${msg.time}</span>
  `;

  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

// SETTINGS

function toggleSettings() {
  document.getElementById("settings").classList.toggle("open");
}

function saveUsername() {
  const newName = document.getElementById("usernameInput").value;
  if (newName) {
    username = newName;
    localStorage.setItem("username", newName);
    alert("Username updated!");
  }
}

function toggleTheme() {
  document.body.classList.toggle("light-mode");
}

function clearChat() {
  messagesDiv.innerHTML = "";
}
</script>

</body>
</html>
